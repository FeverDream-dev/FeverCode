name: Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            bin: fever
            ext: ''
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            bin: fever
            ext: ''
          - os: macos-latest
            target: x86_64-apple-darwin
            bin: fever
            ext: ''
          - os: macos-latest
            target: aarch64-apple-darwin
            bin: fever
            ext: ''
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            bin: fever.exe
            ext: '.exe'

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - name: Install cross-compilation tools
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu
      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-${{ matrix.target }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-${{ matrix.target }}-cargo-
      - name: Build release
        run: cargo build --release --bin fever --target ${{ matrix.target }}
      - name: Package binary
        shell: bash
        run: |
          mkdir -p dist
          cp target/${{ matrix.target }}/release/${{ matrix.bin }} dist/fever-${{ matrix.target }}${{ matrix.ext }}
          chmod +x dist/fever-${{ matrix.target }}${{ matrix.ext }} || true
      - uses: actions/upload-artifact@v4
        with:
          name: fever-${{ matrix.target }}
          path: dist/

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true
      - name: Create checksums
        run: |
          cd artifacts
          sha256sum * > ../checksums-sha256.txt
          mv ../checksums-sha256.txt .
      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(github.ref, 'rc') || contains(github.ref, 'beta') || contains(github.ref, 'alpha') }}
