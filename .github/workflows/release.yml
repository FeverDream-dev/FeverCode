name: Release

on:
  push:
    tags:
      - 'v*'

env:
  CARGO_TERM_COLOR: always

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            name: linux-x86_64-gnu
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
            name: linux-x86_64-musl
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            name: linux-aarch64-gnu

    steps:
    - uses: actions/checkout@v4

    - name: Install Rust
      uses: dtolnay/rust-toolchain@stable
      with:
        toolchain: stable
        targets: ${{ matrix.target }}

    - name: Install musl tools
      if: matrix.target == 'x86_64-unknown-linux-musl'
      run: sudo apt-get install -y musl-tools

    - name: Install aarch64 tools
      if: matrix.target == 'aarch64-unknown-linux-gnu'
      run: |
        sudo apt-get update
        sudo apt-get install -y gcc-aarch64-linux-gnu

    - name: Build
      run: cargo build --release --target ${{ matrix.target }}

    - name: Rename binary
      run: |
        mv target/${{ matrix.target }}/release/fever fever-${{ matrix.name }}

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: fever-${{ matrix.name }}
        path: fever-${{ matrix.name }}

  release:
    name: Release
    needs: build
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Download all artifacts
      uses: actions/download-artifact@v4
      with:
        path: artifacts/

    - name: Create checksums
      run: |
        cd artifacts
        for f in fever-*; do
          sha256sum "$f" > "$f.sha256"
        done
        sha256sum * > SHA256SUMS

    - name: Generate release notes
      run: |
        VERSION=${GITHUB_REF#refs/tags/}
        cat > release_notes.md << 'EOF'
        ## Installation
        
        ### Linux
        ```bash
        curl -fsSL https://github.com/FeverDream-dev/FeverCode/releases/download/${VERSION}/install.sh | bash
        ```
        
        ### Manual Download
        Download the appropriate binary for your architecture:
        
        - **x86_64 GNU**: `fever-linux-x86_64-gnu`
        - **x86_64 MUSL**: `fever-linux-x86_64-musl`
        - **aarch64 GNU**: `fever-linux-aarch64-gnu`
        
        Then:
        ```bash
        chmod +x fever-linux-*
        sudo mv fever-linux-* /usr/local/bin/fever
        ```
        
        ## Verification
        
        Verify the download:
        ```bash
        sha256sum -c fever-linux-*.sha256
        ```
        EOF

    - name: Create Release
      uses: softprops/action-gh-release@v2
      with:
        files: |
          artifacts/fever-*
          artifacts/SHA256SUMS
        body_path: release_notes.md
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  publish-crate:
    name: Publish to crates.io
    runs-on: ubuntu-latest
    needs: build
    if: startsWith(github.ref, 'refs/tags/')

    steps:
    - uses: actions/checkout@v4

    - name: Install Rust
      uses: dtolnay/rust-toolchain@stable
      with:
        toolchain: stable

    - name: Login to crates.io
      run: cargo login ${{ secrets.CRATES_IO_TOKEN }}

    - name: Publish fever-core
      run: cargo publish -p fever-core
      working-directory: crates/fever-core

    - name: Publish fever-config
      run: cargo publish -p fever-config
      working-directory: crates/fever-config

    - name: Publish fever-providers
      run: cargo publish -p fever-providers
      working-directory: crates/fever-providers

    - name: Publish fever-tools
      run: cargo publish -p fever-tools
      working-directory: crates/fever-tools

    - name: Publish fever-search
      run: cargo publish -p fever-search
      working-directory: crates/fever-search

    - name: Publish fever-browser
      run: cargo publish -p fever-browser
      working-directory: crates/fever-browser

    - name: Publish fever-agent
      run: cargo publish -p fever-agent
      working-directory: crates/fever-agent

    - name: Publish fever-tui
      run: cargo publish -p fever-tui
      working-directory: crates/fever-tui

    - name: Publish fever-cli
      run: cargo publish -p fever-cli
      working-directory: crates/fever-cli

    - name: Publish fever-release
      run: cargo publish -p fever-release
      working-directory: crates/fever-release
